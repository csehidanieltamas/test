<h2>User Reviews</h2>
    <div id="reviewsContainer">Loading reviews...</div>

    <script type="module">
    // 1. Import Firebase tools for reading data
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // 2. YOUR FIREBASE KEYS GO HERE! 
    // (Use the exact same keys you used on the review page)
    const firebaseConfig = {
        apiKey: "AIzaSyAR75gRe4V4jEh3q0CnBqQViGw-hvXpNTM",
        authDomain: "test-a1bc1.firebaseapp.com",
        projectId: "test-a1bc1",
        storageBucket: "test-a1bc1.firebasestorage.app",
        messagingSenderId: "38020519116",
        appId: "1:38020519116:web:59be557ad3fb0feee79e69",
        measurementId: "G-B1M3885KFZ"
    };

    // 3. Start Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. Function to fetch and display reviews
    async function loadReviews() {
        const container = document.getElementById("reviewsContainer");
        
        try {
            // Ask Firebase for everything inside the "reviews" collection
            const querySnapshot = await getDocs(collection(db, "reviews"));
            
            // Clear the "Loading reviews..." text
            container.innerHTML = ""; 

            // If the database is completely empty
            if (querySnapshot.empty) {
                container.innerHTML = "<p>No reviews yet.</p>";
                return;
            }

            // Loop through every review Firebase found
            querySnapshot.forEach((doc) => {
                const review = doc.data(); // This grabs the actual text/rating/name

                // Create the visual box for the review (using your CSS classes!)
                const div = document.createElement("div");
                div.classList.add("review");
                div.innerHTML = `<strong>${review.username}</strong> (${review.rating}/5) <br> ${review.review} <br><hr>`;
                
                // Add it to the screen
                container.appendChild(div);
            });

        } catch (error) {
            console.error("Error loading reviews:", error);
            container.innerHTML = "<p>❌ Failed to load reviews.</p>";
        }
    }

    // Run the function as soon as the page opens!
    loadReviews();
</script>
