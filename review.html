<form id="reviewForm">
    <h2>Leave a Review</h2>
    <input type="text" id="username" placeholder="Your Name" required>
    <textarea id="review" placeholder="Write your review..." required></textarea>
    <input type="number" id="rating" min="1" max="5" placeholder="Rating (1-5)" required>
    <button type="submit">Submit Review</button>
</form>

<div id="reviewsContainer"></div> <!-- This will display reviews -->

<script type="module">
    // 1. Import Firebase from the internet (no server needed!)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // 2. YOUR FIREBASE KEYS GO HERE! 
    // (Replace these fake values with the real ones from your Firebase dashboard)
    const firebaseConfig = {
        apiKey: "AIzaSyAR75gRe4V4jEh3q0CnBqQViGw-hvXpNTM",
        authDomain: "test-a1bc1.firebaseapp.com",
        projectId: "test-a1bc1",
        storageBucket: "test-a1bc1.firebasestorage.app",
        messagingSenderId: "38020519116",
        appId: "1:38020519116:web:59be557ad3fb0feee79e69",
        measurementId: "G-B1M3885KFZ"
    };

    // 3. Start up Firebase and the Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. What happens when the user clicks "Submit"
    document.getElementById("reviewForm").addEventListener("submit", async function (event) {
        event.preventDefault(); // Stop the page from refreshing

        // Get the values typed into the boxes
        const username = document.getElementById("username").value.trim();
        const reviewText = document.getElementById("review").value.trim();
        const rating = parseInt(document.getElementById("rating").value.trim());

        // Check if everything is filled out
        if (!username || !reviewText || !rating || rating < 1 || rating > 5) {
            alert("⚠️ Please fill out all fields correctly (rating must be between 1-5).");
            return;
        }

        try {
            // Send the data to your Firebase Database!
            // We save it in a collection called "reviews"
            await addDoc(collection(db, "reviews"), {
                username: username,
                review: reviewText,
                rating: rating,
                timestamp: serverTimestamp() // This records the exact time they posted it!
            });

            alert("✅ Review submitted successfully!");
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; // Rickroll cuz i can hahaha
            
        } catch (error) {
            console.error("Network error:", error);
            alert("❌ Failed to submit review. Check the console for details.");
        }
    });
</script>
